<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keep It Neat — icon set</title>
  <meta name="robots" content="noindex">
  <!--
    Dev-only reference page for the shared chrome icons in neat-icons.js.
    Not linked from the live site. The brand page (index.html) stays
    pure HTML/CSS, no JS — this file is a workshop tool, not production.
    Serve it (ES module import needs HTTP): python3 -m http.server 8766
  -->
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --text-muted: #666666;
      --border: #e5e5e5;
      --accent: #047857;
      --card-bg: #fafafa;
      --card-hover: #f0f0f0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --text: #f5f5f5;
        --text-muted: #999999;
        --border: #222222;
        --accent: #34d399;
        --card-bg: #141414;
        --card-hover: #1c1c1c;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      color-scheme: light dark;
    }
    body { background: var(--bg); color: var(--text); min-height: 100vh; }
    main { max-width: 56rem; margin: 0 auto; padding: 3rem 1.5rem 4rem; }

    header { margin-bottom: 2.5rem; }
    h1 {
      font-size: 1.5rem; font-weight: 650; letter-spacing: -0.02em;
      display: flex; align-items: center; gap: 0.6rem;
    }
    h1 .mark { color: var(--accent); display: inline-flex; }
    h1 .mark svg { width: 1.4rem; height: 1.4rem; }
    .sub { color: var(--text-muted); margin-top: 0.35rem; font-size: 0.95rem; }
    .sub code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85em; color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(8.5rem, 1fr));
      gap: 0.75rem;
    }
    .cell {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      padding: 1.25rem 0.75rem 0.9rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.7rem;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
      position: relative;
    }
    .cell:hover {
      background: var(--card-hover);
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .cell:active { transform: translateY(0); }
    .cell .icon { width: 28px; height: 28px; color: var(--accent); }
    .cell .key {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.75rem; color: var(--text-muted);
      text-align: center; word-break: break-word;
    }
    .cell.copied { border-color: var(--accent); }
    .cell .toast {
      position: absolute; top: 0.4rem; right: 0.5rem;
      font-size: 0.65rem; font-weight: 600; color: var(--accent);
      opacity: 0; transition: opacity 0.15s ease; pointer-events: none;
    }
    .cell.copied .toast { opacity: 1; }

    footer {
      margin-top: 2.5rem; padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted); font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1><span class="mark" id="mark"></span> Keep It Neat — icon set</h1>
      <p class="sub">Shared chrome icons from <code>neat-icons.js</code>. Click any icon to copy its key.</p>
    </header>

    <div class="grid" id="grid"></div>

    <footer>
      Monochrome · 24×24 · 1.5 stroke · inherits <code>currentColor</code>.
      Domain icons (weather, recipes) live with their app, not here.
    </footer>
  </main>

  <script type="module">
    import { NEAT_ICONS } from './neat-icons.js';

    // Brand mark in the header reuses the theme-light (sun) glyph.
    document.getElementById('mark').innerHTML = NEAT_ICONS['theme-light'];

    const grid = document.getElementById('grid');
    for (const [key, svg] of Object.entries(NEAT_ICONS)) {
      const cell = document.createElement('button');
      cell.type = 'button';
      cell.className = 'cell';
      cell.innerHTML = `${svg}<span class="key">${key}</span><span class="toast">copied</span>`;
      cell.addEventListener('click', async () => {
        try { await navigator.clipboard.writeText(key); } catch { /* ignore */ }
        cell.classList.add('copied');
        setTimeout(() => cell.classList.remove('copied'), 1000);
      });
      grid.appendChild(cell);
    }
  </script>
</body>
</html>
